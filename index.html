<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能租车费用AA计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .card {
                padding: 16px;
                overflow-x: hidden;
            }
            
            /* 行程管理 */
            #tripPersonsCheckboxes {
                max-height: 60px;
            }
            
            /* 费用输入网格 */
            .expense-input-grid {
                grid-template-columns: 1fr;
            }
            
            /* 分摊方式按钮 */
            .split-method-tabs {
                flex-direction: column;
            }
            
            .split-method-tabs button {
                width: 100%;
                padding: 12px;
            }
            
            /* 参与人选择 */
            .person-selector-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .person-select-card {
                padding: 8px 5px;
            }
            
            /* 行程列表 */
            #tripList > div {
                display: flex !important;
                flex-direction: column !important;
                gap: 8px !important;
                align-items: flex-start !important;
            }
            
            #tripList > div > div {
                width: 100% !important;
            }
            
            /* 费用列表 */
            .expense-item {
                padding: 12px;
            }
            
            .expense-header {
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 8px !important;
            }
            
            .expense-header > div {
                width: 100%;
                justify-content: space-between !important;
            }
            
            /* 汇总卡片 */
            .summary-cards {
                grid-template-columns: 1fr;
            }
            
            /* 表格 */
            .detail-table {
                font-size: 12px;
                width: 100%;
                overflow-x: auto;
                display: block;
            }
            
            .detail-table th,
            .detail-table td {
                padding: 6px;
                white-space: nowrap;
            }
            
            /* 结算指引 */
            #settlementGuide {
                overflow-x: hidden;
            }
            
            /* 按钮 */
            .btn {
                padding: 12px 16px;
            }
            
            /* 输入框 */
            input[type="text"],
            input[type="number"],
            select {
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
            font-size: 14px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .card-title {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }

        /* 人物管理 */
        .person-section {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .person-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            font-size: 13px;
        }

        .person-tag .remove-btn {
            cursor: pointer;
            opacity: 0.8;
        }

        .add-person-form {
            display: flex;
            gap: 8px;
        }

        input[type="text"],
        input[type="number"],
        select {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
        }

        .btn-success {
            background: #2ed573;
            color: white;
        }

        .btn-secondary {
            background: #f1f2f6;
            color: #333;
        }

        .btn-outline {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 费用录入区 */
        .expense-input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        /* 分摊方式选择 */
        .split-method-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .split-tab {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 600;
        }

        .split-tab.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* 参与人设置区 */
        .participants-config {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .config-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .config-title {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .person-selector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin-bottom: 12px;
        }

        .person-select-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .person-select-card:hover {
            border-color: #667eea;
        }

        .person-select-card.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .person-select-card .name {
            font-size: 13px;
            font-weight: 600;
        }

        /* 比例/金额输入 */
        .split-details {
            background: white;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .split-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .split-row:last-child {
            border-bottom: none;
        }

        .split-row .name {
            min-width: 80px;
            font-weight: 600;
            color: #333;
        }

        .split-input-group {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .split-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 3px;
        }

        .split-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        .split-number-input {
            width: 70px;
            padding: 6px 8px;
            text-align: center;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-weight: 600;
        }

        .split-preview {
            min-width: 70px;
            text-align: right;
            color: #667eea;
            font-weight: 600;
            font-size: 14px;
        }

        .total-indicator {
            text-align: center;
            padding: 8px;
            margin-top: 10px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .total-indicator.ok {
            background: #d4edda;
            color: #155724;
        }

        .total-indicator.warning {
            background: #fff3cd;
            color: #856404;
        }

        /* 快捷按钮 */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 6px 12px;
            font-size: 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .quick-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        /* 费用预览 */
        .expense-preview-box {
            background: #e8f4fd;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .preview-title {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }

        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
        }

        .preview-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .preview-item .payer-name {
            font-size: 12px;
            color: #666;
        }

        .preview-item .amount {
            font-size: 16px;
            font-weight: 700;
            color: #667eea;
        }

        /* 费用列表 */
        .expense-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .expense-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            position: relative;
        }

        .expense-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .expense-type {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        .expense-amount {
            font-size: 18px;
            font-weight: 700;
            color: #ff4757;
        }

        .expense-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .expense-shares {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .share-tag {
            background: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            border: 1px solid #e0e0e0;
        }

        .share-tag .name {
            color: #333;
        }

        .share-tag .amount {
            color: #667eea;
            font-weight: 600;
            margin-left: 4px;
        }

        .expense-actions {
            position: absolute;
            top: 15px;
            right: 15px;
        }

        /* 汇总表 */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
        }

        /* 明细表 */
        .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .detail-table th,
        .detail-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .detail-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .text-positive {
            color: #2ed573;
            font-weight: 600;
        }

        .text-negative {
            color: #ff4757;
            font-weight: 600;
        }

        .empty-tip {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 768px) {
            .expense-input-grid {
                grid-template-columns: 1fr;
            }
            
            .person-selector-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .split-row {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 智能租车费用AA计算器</h1>
        <p class="subtitle">每个费用独立设置参与人和分摊比例</p>

        <!-- 行程管理 -->
        <div class="card">
            <h2 class="card-title">🚗 行程管理</h2>
            <div style="margin-bottom: 15px; padding: 12px; background: #f8f9fa; border-radius: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 150px 200px 100px; gap: 10px; align-items: start; margin-bottom: 10px; grid-template-rows: auto auto; @media (max-width: 768px) { grid-template-columns: 1fr; grid-template-rows: auto; }">
                    <input type="text" id="tripName" placeholder="行程名称（如：市内、去程、返程）" style="grid-column: 1; grid-row: 1; @media (max-width: 768px) { grid-column: 1; grid-row: 1; }">
                    <input type="number" id="tripDistance" placeholder="公里数" min="0" step="0.1" style="grid-column: 2; grid-row: 1; @media (max-width: 768px) { grid-column: 1; grid-row: 2; }">
                    <div style="grid-column: 3; grid-row: 1 / 3; @media (max-width: 768px) { grid-column: 1; grid-row: 3; }" id="tripPersonsContainer">
                        <div style="font-size: 12px; color: #666; font-weight: 600; margin-bottom: 5px;">参与人</div>
                        <div style="display: flex; flex-wrap: wrap; gap: 8px; max-height: 80px; overflow-y: auto; padding: 8px; border: 2px solid #e0e0e0; border-radius: 8px;" id="tripPersonsCheckboxes">
                            <div style="color: #999; width: 100%; text-align: center; padding: 10px;">请先添加人员</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="addTrip()" style="grid-column: 4; grid-row: 1 / 3; align-self: center; @media (max-width: 768px) { grid-column: 1; grid-row: 4; margin-top: 10px; }">添加</button>
                </div>
                <div id="tripList" style="margin-top: 15px;">
                    <div style="color: #999; text-align: center; padding: 20px;">暂无行程</div>
                </div>
            </div>
        </div>

        <!-- 数据管理 -->
        <div class="card">
            <h2 class="card-title">数据管理</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <button class="btn btn-secondary" onclick="saveData()">💾 保存数据</button>
                <button class="btn btn-secondary" onclick="loadData()">📂 加载数据</button>
                <button class="btn btn-outline" onclick="exportData()">📤 导出JSON</button>
                <button class="btn btn-outline" onclick="importData()">📥 导入JSON</button>
                <button class="btn btn-danger" onclick="clearAllData()">🗑️ 清空所有</button>
            </div>
            <div id="saveStatus" style="font-size: 13px; color: #666; padding: 8px; background: #f8f9fa; border-radius: 6px; display: none;"></div>
            <input type="file" id="importFile" style="display: none;" accept=".json" onchange="handleImport(event)">
        </div>

        <!-- 人员管理 -->
        <div class="card">
            <h2 class="card-title">参与人员</h2>
            <div class="person-section" id="personList">
                <span style="color: #999;">暂无人员，请添加</span>
            </div>
            <div class="add-person-form">
                <input type="text" id="newPersonName" placeholder="输入姓名" style="flex: 1;">
                <button class="btn btn-primary" onclick="addPerson()">添加</button>
            </div>
        </div>

        <!-- 添加费用 -->
        <div class="card">
            <h2 class="card-title">添加费用</h2>
            
            <div class="expense-input-grid">
                <div class="form-group">
                    <label>费用类型</label>
                    <select id="expenseType">
                        <option value="租车费">🚗 租车费</option>
                        <option value="高速费">🛣️ 高速费</option>
                        <option value="油费/电费">⛽ 油费/电费</option>
                        <option value="停车费">🅿️ 停车费</option>
                        <option value="餐饮">🍽️ 餐饮</option>
                        <option value="住宿">🏨 住宿</option>
                        <option value="其他">📦 其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>金额 (元)</label>
                    <input type="number" id="expenseAmount" placeholder="0.00" min="0" step="0.01" oninput="updatePreview()">
                </div>
                <div class="form-group">
                    <label>付款人</label>
                    <select id="expensePayer">
                        <option value="">选择付款人</option>
                    </select>
                </div>
            </div>

            <!-- 分摊方式 -->
            <div style="margin-bottom: 10px;">
                <label style="font-size: 12px; color: #666; font-weight: 600;">分摊方式</label>
                <div class="split-method-tabs">
                    <button class="split-tab active" onclick="setSplitMethod('equal')">⚖️ 平均分摊</button>
                    <button class="split-tab" onclick="setSplitMethod('ratio')">📊 按比例</button>
                    <button class="split-tab" onclick="setSplitMethod('amount')">💰 固定金额</button>
                    <button class="split-tab" onclick="setSplitMethod('custom')">⚙️ 自定义</button>
                    <button class="split-tab" onclick="setSplitMethod('distance')">🚗 按公里数</button>
                </div>
            </div>

            <!-- 参与人选择 -->
            <div class="participants-config">
                <div class="config-header">
                    <span class="config-title">选择参与人</span>
                    <div>
                        <button class="btn btn-small btn-outline" onclick="selectAll()">全选</button>
                        <button class="btn btn-small btn-outline" onclick="clearAll()">清空</button>
                    </div>
                </div>
                
                <div class="person-selector-grid" id="personSelector">
                    <!-- 动态生成 -->
                </div>

                <!-- 比例/金额输入区 -->
                <div class="split-details" id="splitDetails" style="display: none;">
                    <!-- 动态生成 -->
                </div>

                <div class="total-indicator" id="totalIndicator" style="display: none;">
                    总计: 0%
                </div>

                <div class="quick-actions">
                    <button class="quick-btn" onclick="quickSet('all')">所有人</button>
                    <button class="quick-btn" onclick="quickSet('driver')">仅司机</button>
                    <button class="quick-btn" onclick="quickSet('half')">一半人</button>
                </div>
            </div>

            <!-- 费用预览 -->
            <div class="expense-preview-box" id="previewBox" style="display: none;">
                <div class="preview-title">费用分摊预览</div>
                <div class="preview-grid" id="previewGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <button class="btn btn-success" onclick="addExpense()" style="width: 100%;">添加费用</button>
        </div>

        <!-- 费用明细 -->
        <div class="card">
            <h2 class="card-title">费用明细</h2>
            <div class="expense-list" id="expenseList">
                <div class="empty-tip">
                    <div style="font-size: 40px; margin-bottom: 10px;">📝</div>
                    <p>暂无费用记录</p>
                </div>
            </div>
        </div>

        <!-- 费用汇总 -->
        <div class="card">
            <h2 class="card-title">费用汇总</h2>
            
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="label">总支出</div>
                    <div class="value" id="totalExpense">¥0</div>
                </div>
                <div class="summary-card">
                    <div class="label">费用笔数</div>
                    <div class="value" id="expenseCount">0</div>
                </div>
                <div class="summary-card">
                    <div class="label">参与人数</div>
                    <div class="value" id="personCount">0</div>
                </div>
            </div>

            <h3 style="margin: 20px 0 10px; font-size: 16px;">个人明细</h3>
            <table class="detail-table">
                <thead>
                    <tr>
                        <th>姓名</th>
                        <th>已付金额</th>
                        <th>应付金额</th>
                        <th>差额</th>
                        <th>结算</th>
                    </tr>
                </thead>
                <tbody id="summaryBody">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #999;">暂无数据</td>
                    </tr>
                </tbody>
            </table>

            <h3 style="margin: 25px 0 10px; font-size: 16px;">💰 结算指引</h3>
            <div id="settlementGuide">
                <div class="empty-tip" style="padding: 20px;">
                    <p>添加费用后将显示结算指引</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let persons = [];
        let expenses = [];
        let trips = []; // 行程数据
        let currentMethod = 'equal';
        let selectedPersons = new Set();
        let splitValues = {}; // 存储每个人的分摊值

        function addPerson() {
            const input = document.getElementById('newPersonName');
            const name = input.value.trim();
            
            if (!name) {
                alert('请输入姓名');
                return;
            }

        function updateTotalIndicator(type) {
            const indicator = document.getElementById('totalIndicator');
            const amount = parseFloat(document.getElementById('expenseAmount').value) || 0;
            
            let total = 0;
            selectedPersons.forEach(name => {
                total += splitValues[name] || 0;
            });
            
            if (type === 'ratio') {
                if (Math.abs(total - 100) < 0.1) {
                    indicator.textContent = `总计: ${total.toFixed(1)}% ✓`;
                    indicator.className = 'total-indicator ok';
                } else if (total < 100) {
                    indicator.textContent = `总计: ${total.toFixed(1)}% (还差${(100-total).toFixed(1)}%)`;
                    indicator.className = 'total-indicator warning';
                } else {
                    indicator.textContent = `总计: ${total.toFixed(1)}% (超出${(total-100).toFixed(1)}%)`;
                    indicator.className = 'total-indicator warning';
                }
            } else if (type === 'amount') {
                if (Math.abs(total - amount) < 0.01) {
                    indicator.textContent = `总计: ¥${total.toFixed(2)} ✓`;
                    indicator.className = 'total-indicator ok';
                } else if (total < amount) {
                    indicator.textContent = `总计: ¥${total.toFixed(2)} (还差¥${(amount-total).toFixed(2)})`;
                    indicator.className = 'total-indicator warning';
                } else {
                    indicator.textContent = `总计: ¥${total.toFixed(2)} (超出¥${(total-amount).toFixed(2)})`;
                    indicator.className = 'total-indicator warning';
                }
            } else {
                indicator.textContent = `总权重: ${total.toFixed(2)}`;
                indicator.className = total > 0 ? 'total-indicator ok' : 'total-indicator warning';
            }
        }

        function updatePreview() {
            const amount = parseFloat(document.getElementById('expenseAmount').value) || 0;
            const previewBox = document.getElementById('previewBox');
            const previewGrid = document.getElementById('previewGrid');
            
            if (amount <= 0 || selectedPersons.size === 0) {
                previewBox.style.display = 'none';
                return;
            }
            
            previewBox.style.display = 'block';
            
            // 计算每人分摊
            const shares = calculateShares(amount);
            
            previewGrid.innerHTML = Object.entries(shares).map(([name, shareAmount]) => `
                <div class="preview-item">

        function calculateShares(amount) {
            const shares = {};
            const selected = Array.from(selectedPersons);
            
            if (selected.length === 0) return shares;
            
            if (currentMethod === 'equal') {
                // 平均分摊
                const share = amount / selected.length;
                selected.forEach(name => shares[name] = share);
                
            } else if (currentMethod === 'ratio') {
                // 按比例分摊
                const totalRatio = selected.reduce((sum, name) => sum + (splitValues[name] || 0), 0);
                if (totalRatio > 0) {
                    selected.forEach(name => {
                        const ratio = (splitValues[name] || 0) / totalRatio;
                        shares[name] = amount * ratio;
                    });
                }
                
            } else if (currentMethod === 'amount') {
                // 固定金额
                selected.forEach(name => {
                    shares[name] = splitValues[name] || 0;
                });
                
            } else if (currentMethod === 'custom') {
                // 按权重分摊
                const totalWeight = selected.reduce((sum, name) => sum + (splitValues[name] || 0), 0);
                if (totalWeight > 0) {
                    selected.forEach(name => {
                        const weight = (splitValues[name] || 0) / totalWeight;
                        shares[name] = amount * weight;
                    });
                }
            } else if (currentMethod === 'distance') {
                // 按公里数分摊
                const personDistance = {};
                selected.forEach(name => {
                    personDistance[name] = trips
                        .filter(trip => trip.persons.includes(name) && selected.includes(name))
                        .reduce((total, trip) => total + trip.distance, 0);
                });
                
                const totalDistance = Object.values(personDistance).reduce((sum, distance) => sum + distance, 0);
                if (totalDistance > 0) {
                    selected.forEach(name => {
                        const distance = personDistance[name] || 0;
                        const ratio = distance / totalDistance;
                        shares[name] = amount * ratio;
                    });
                } else {
                    // 如果没有行程数据，默认平均分摊
                    const share = amount / selected.length;
                    selected.forEach(name => shares[name] = share);
                }
            }
            
            return shares;
        }

        function updateSummary() {

            expenses.forEach(e => {
                if (stats[e.payer]) stats[e.payer].paid += e.amount;

        function updateSettlementGuide(stats) {
            const container = document.getElementById('settlementGuide');

            }
            
            // 计算谁该给谁钱
            const settlements = calculateSettlements(stats);
            
            if (settlements.length === 0) {
                container.innerHTML = `

                `;
                return;
            }
            
            // 按付款人分组
            const grouped = {};
            settlements.forEach(s => {
                if (!grouped[s.from]) grouped[s.from] = [];
                grouped[s.from].push(s);
            });
            
            container.innerHTML = `

                                        <span style="font-weight: 700; color: #ff4757; font-size: 16px;">¥${s.amount.toFixed(2)}</span>
                                    </div>
                                `).join('')}
                                <div style="display: flex; justify-content: space-between; align-items: center; padding-top: 8px; margin-top: 5px; border-top: 2px solid #e0e0e0;">
                                    <span style="color: #333; font-weight: 600;">合计支付</span>
                                    <span style="font-weight: 700; color: #ff4757; font-size: 18px;">¥${items.reduce((sum, i) => sum + i.amount, 0).toFixed(2)}</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                    
                    <div style="margin-top: 15px; padding: 12px; background: #e8f4fd; border-radius: 8px;">
                        <div style="font-weight: 600; color: #333; margin-bottom: 10px; font-size: 14px;">📋 转账清单（简洁版）</div>
                        <table style="width: 100%; font-size: 13px;">
                            <thead>
                                <tr style="color: #666;">
                                    <th style="text-align: left; padding: 5px;">付款人</th>
                                    <th style="text-align: left; padding: 5px;">收款人</th>
                                    <th style="text-align: right; padding: 5px;">金额</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${settlements.map(s => `
                                    <tr>
                                        <td style="padding: 5px;">${s.from}</td>
                                        <td style="padding: 5px;">${s.to}</td>
                                        <td style="padding: 5px; text-align: right; font-weight: 600; color: #ff4757;">¥${s.amount.toFixed(2)}</td>
                                    </tr>

        function calculateSettlements(stats) {
            const settlements = [];
            
            // 计算每个人的净额（正数应收，负数应付）
            const balances = {};
            persons.forEach(name => {
                balances[name] = (stats[name]?.paid || 0) - (stats[name]?.shouldPay || 0);
            });
            
            // 找出应付的人（余额为负）和应收的人（余额为正）
            const debtors = persons.filter(p => balances[p] < -0.01).sort((a, b) => balances[a] - balances[b]);
            const creditors = persons.filter(p => balances[p] > 0.01).sort((a, b) => balances[b] - balances[a]);
            
            // 进行结算配对
            let i = 0, j = 0;
            while (i < debtors.length && j < creditors.length) {
                const debtor = debtors[i];
                const creditor = creditors[j];
                const debt = Math.abs(balances[debtor]);
                const credit = balances[creditor];
                const amount = Math.min(debt, credit);
                
                if (amount > 0.01) {
                    settlements.push({
                        from: debtor,
                        to: creditor,
                        amount: amount
                    });
                }
                
                balances[debtor] += amount;
                balances[creditor] -= amount;
                
                if (Math.abs(balances[debtor]) < 0.01) i++;
                if (Math.abs(balances[creditor]) < 0.01) j++;
            }
            
            return settlements;
        }

        }

        function loadData() {
            const saved = localStorage.getItem('carRentalAA_data');
            if (!saved) {
                showSaveStatus('❌ 没有找到保存的数据');
                return;
            }
            
            try {
                const data = JSON.parse(saved);
                if (confirm(`找到 ${data.saveTime} 保存的数据，是否加载？`)) {
                    persons = data.persons || [];
                    expenses = data.expenses || [];
                    trips = data.trips || [];
                    // 转换旧数据格式（兼容单个person字段）
                    trips = trips.map(trip => {
                        if (trip.person && !trip.persons) {
                            return {
                                ...trip,
                                persons: [trip.person]
                            };
                        }
                        return trip;
                    });
                    updateAll();
                    showSaveStatus('✅ 数据加载成功');
                }
            } catch (e) {
                showSaveStatus('❌ 数据加载失败');
                console.error('加载数据失败:', e);
            }
        }

        function exportData() {
            const data = {
                persons,
                expenses,
                trips,
                exportTime: new Date().toLocaleString('zh-CN'),
                version: '1.0'
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `租车费用AA_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showSaveStatus('✅ 数据已导出');
        }

        function importData() {
            document.getElementById('importFile').click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm(`导入 ${data.exportTime || '未知时间'} 的数据？当前数据将被覆盖。`)) {
                        persons = data.persons || [];
                        expenses = data.expenses || [];
                        trips = data.trips || [];
                        updateAll();
                        showSaveStatus('✅ 数据导入成功');
                    }
                } catch (err) {
                    showSaveStatus('❌ 文件格式错误');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function clearAllData() {
            if (!confirm('确定要清空所有数据吗？此操作不可恢复！')) return;
            persons = [];
            expenses = [];
            trips = [];
            selectedPersons.clear();
            splitValues = {};
            updateAll();
            localStorage.removeItem('carRentalAA_data');
            showSaveStatus('✅ 数据已清空');
        }

        function showSaveStatus(message) {
            const status = document.getElementById('saveStatus');
            status.textContent = message;
            status.style.display = 'block';
            setTimeout(() => {
                status.style.display = 'none';
            }, 3000);
        }

        function updateAll() {
            updatePersonList();
            updatePayerSelect();
            updateTripPersonsSelect();
            updatePersonSelector();
            updateSplitDetails();
            updateTripList();
            updatePreview();
            updateExpenseList();
            updateSummary();
        }

        // 自动保存
        function autoSave() {
            if (persons.length > 0 || expenses.length > 0 || trips.length > 0) {
                const data = { persons, expenses, trips, saveTime: new Date().toLocaleString('zh-CN') };
                localStorage.setItem('carRentalAA_data', JSON.stringify(data));
            }
        }

        // 页面加载时自动加载数据
        function init() {
            const saved = localStorage.getItem('carRentalAA_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    persons = data.persons || [];
                    expenses = data.expenses || [];
                    updateAll();
                    if (persons.length > 0 || expenses.length > 0) {
                        showSaveStatus(`📂 已自动恢复 ${data.saveTime} 的数据`);
                    }
                } catch (e) {
                    console.error('自动加载失败', e);
                }
            }
        }

        // 监听数据变化自动保存
        const originalAddPerson = addPerson;
        addPerson = function() {
            originalAddPerson();
            autoSave();
        };

        const originalRemovePerson = removePerson;
        removePerson = function(name) {
            originalRemovePerson(name);
            autoSave();
        };

        const originalAddExpense = addExpense;
        addExpense = function() {
            originalAddExpense();
            autoSave();
        };

        const originalRemoveExpense = removeExpense;
        removeExpense = function(id) {
            originalRemoveExpense(id);
            autoSave();
        };

        // 初始化
        init();

        // 回车添加人员
        document.getElementById('newPersonName').addEventListener('keypress', e => {
            if (e.key === 'Enter') addPerson();
        });
    </script>
</body>
</html>
